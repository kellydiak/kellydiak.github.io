<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="author" content="Kellyane Louise DIAKUMPUNA">
		<link rel="stylesheet" href="css/style.css">
		<title>algirlthm</title>
	</head>
	<style>
		
		.ordiFerme {
			display: block;
			margin : auto;
			margin-top: 150px;
			width: 600px;
			height: auto;
		}
		#ordiOuvert {
			position : relative;
			text-align: center;
		}
		#ordiOuvert img {
			display: block;
			margin : auto;
		}
		.ecran {
			position: absolute;
			top: 37%;
			left: 50%;
			transform: translate(-50%, -50%);
		}
		
	
	</style>

	<body style="background-image: linear-gradient(to bottom,rgba(255,0,0,0), rgba(255,0,0,0),rgba(255,0,0,0),rgba(254, 226, 230,1)); background-attachment: fixed;">
		<!--<p> Cliquez sur l'iBook pour l'ouvrir.</p>-->
		<!-- ordinateur fermé -->
		<img id="oF" class="ordiFerme" src="img/ordiClose.png" alt="ordinateurFerme" onclick="ordiEstOuvert()">
		
		<!-- ordinateur ouvert + texte -->
		 <div id="ordiOuvert" style="display: none;">
			<img src="img/ordiOpen.png" alt="ordinateurOuvert">
				<div class="ecran">
					<h2>Bienvenue sur mon portfolio !</h2>
					<p>cliquez sur le bouton pour commencer : </p>
					<a class="indexBouton" href="home.html">txt</a>
				</div>
		</div>

		<script>
			function ordiEstOuvert() {
				document.getElementById("ordiOuvert").style.display = "block"; //affiche l'ordinateur ouvert
				document.getElementById("oF").style.display = "none"; // cache l'ordinateur fermé
			}	
		</script>
	</body>
</html>
