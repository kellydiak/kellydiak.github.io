<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="author" content="Kellyane Louise DIAKUMPUNA">
		<link rel="icon" type="image/png" href="img/logoAT.png">
		<link rel="stylesheet" href="css/style.css">
		<title>algirlthm</title>
	</head>
	<style>

		#texte {
			text-align: center;
			margin-top: 10px;	
		}

		div p { 
			color: var(--grisgrah2);
			font-size: 17px;
			font-style : oblique ;
		}
		
		.ordiFerme {
			display: block;
			margin : auto;
			margin-top: 150px;
			width: 600px;
			height: auto;
			
		}
		#ordiOuvert {
			position : relative;
			text-align: center;
			
		}
		#ordiOuvert img {
			display: block;
			margin : auto;
		}
		.ecran {
			position: absolute; 
			top: 36%; 
			left: 50%; 
			transform: translate(-50%, -50%); 
			
		}
		
	
	</style>

	<body style="background-image: linear-gradient(to bottom,rgba(255,0,0,0), rgba(255,0,0,0),rgba(255,0,0,0),rgba(255, 216, 232,1)); background-attachment: fixed;">
		
		<div id="texte">
			<p>*Cliquez sur l'iBook pour l'ouvrir. <br> <p style="font-size: 13px;">&copy; 2026 Algirlthm.</p> </p>
		</div>
		
		<!-- ordinateur fermé -->
		<img id="oF" class="ordiFerme" src="img/ordiClose.png" alt="ordinateurFerme" onclick="ordiEstOuvert()">
		
		<!-- ordinateur ouvert + texte -->
		 <div id="ordiOuvert" style="display: none;">
			<img src="img/ordiOpen.png" alt="ordinateurOuvert">
				<div class="ecran">
					<h2>Bienvenue !</h2>
					<p>pour continuer cliquez sur play. </p>
					<a class="indexBouton" href="home.html">▶︎</a>
				</div>
		</div>

		<script>
			function ordiEstOuvert() {
				document.getElementById("ordiOuvert").style.display = "block"; //affiche l'ordinateur ouvert
				document.getElementById("oF").style.display = "none"; // cache l'ordinateur fermé
				document.getElementById("texte").style.display = "none"; // cache le texte
			}	
		</script>
	</body>
</html>
